# Example function for generating skills (Conceptual)
def generate_skills(role):
  if role == "Engineering Support":
    return random.choice(["Mechanical Repair", "Electrical Systems", "Robotics", "Material Science"])
  elif role == "Technical Support":
    return random.choice(["Computer Systems", "Communication Networks", "Data Analysis", "Software Debugging"])
  elif role == "Simulation Support":
    return random.choice(["Virtual reality design", "Simulation debugging", "AI interaction"])
  elif role == "Medical Support":
    return random.choice(["Bioengineering", "Trauma care", "Genetic Modification"])
  else:
    return "Unknown"

