# Quasm Space Force Rank Structure & Crew Manifest

## Quasm Space Force Rank Structure

### Enlisted Personnel

* E-1: Recruit (RCT)
* E-2: Spaceman Apprentice (SA) - Hayden Stone Jr.
* E-3: Spaceman (SN)
* E-4: Specialist (SPC)
* E-5: Corporal (CPL)
* E-6: Sergeant (SGT)
* E-7: Staff Sergeant (SSGT)
* E-8: Master Sergeant (MSG)
* E-9: Sergeant Major (SGM)

### Officers

* O-1: Ensign Second Class (ENS2)
* O-2: Ensign First Class (ENS1)
* O-3: Lieutenant Junior Grade (LTJG)
* O-4: Lieutenant (LT)
* O-5: Lieutenant Commander (LCDR) - Ava Stone
* O-6: Commander (CDR) - Hayden Stone Sr.

### Flag Officers

* O-7: Rear Admiral Lower Half (RDML)
* O-8: Rear Admiral (RADM)
* O-9: Vice Admiral (VADM)
* O-10: Admiral (ADM)
* O-11: Fleet Admiral (FADM)

