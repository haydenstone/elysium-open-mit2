import random

def generate_skills(role, skill_level):
    technical_skills = {
        "Engineering Support": ["Mechanical Repair", "Electrical Systems", "Robotics", "Material Science", "Systems Diagnostics"],
        "Technical Support": ["Computer Systems", "Communication Networks", "Data Analysis", "Software Debugging", "Hardware Maintenance"],
        "Simulation Support": ["Virtual Reality Design", "Simulation Debugging", "AI Interaction", "Scenario Development", "Interface Design"],
        "Medical Support": ["Bioengineering", "Trauma Care", "Genetic Modification", "Pharmaceuticals", "Medical Robotics"]
    }
    levels = {"novice": 1, "intermediate": 2, "expert": 3}
    if role in technical_skills:
        skills = random.sample(technical_skills[role], levels[skill_level])
        return skills
    else:
        return ["Unknown"]

def generate_name():
    first_names = ["Alex", "Jordan", "Taylor", "Morgan", "Casey", "Riley", "Blake", "Avery", "Cameron", "Jamie"]
    last_names = ["Smith", "Jones", "Williams", "Brown", "Davis", "Miller", "Wilson", "Moore", "Taylor", "Anderson"]
    return f"{random.choice(first_names)} {random.choice(last_names)}"

random_crew = []
roles = ["Engineering Support", "Technical Support", "Simulation Support", "Medical Support"]
for i in range(4):
    role = roles[i]
    name = generate_name()
    level = random.choice(list(levels.keys()))
    random_crew.append({
        "name": name,
