# Communication Channels within Alpha Beta Simulation

channels:

  # Core Communication Channels
  - name: "general"
    description: "General discussions and announcements."
    access: "all" 
  - name: "development"
    description: "Development updates, code reviews, and technical discussions."
    access: ["Hayden", "Ava", "Research Team", "Engineering Team"]
  - name: "research"
    description: "Research findings, data analysis, and theoretical discussions."
    access: ["Hayden", "Ava", "Research Team"]
  - name: "social"
    description: "Casual conversations, social events, and personal updates."
    access: "all" 

  # Department-Specific Channels
  - name: "engineering"
    description: "Engineering team communications and project updates."
    access: ["Engineering Team", "Simulation Experts"] 
    subchannels:
      - name: "software"
        access: ["Software Engineers", "Simulation Experts"]
      - name: "hardware"
        access: ["Hardware Engineers", "Simulation Experts"]
  - name: "research"
    description: "Research team communications and project updates."
    access: ["Research Team"]
    subchannels:
      - name: "ai_research"
        access: ["AI Researchers"]
      - name: "neuroscience"
        access: ["Neuroscience Researchers"]

  # Individual Communication Channels
  - name: "hayden_direct"
    description: "Direct messages for Hayden."
    access: ["Hayden"]
  - name: "ava_direct"
    description: "Direct messages for Ava."
    access: ["Ava"]
  - name: "research_lead"
    description: "Direct messages for the Research Lead."
    access: ["Research Lead"]
  - name: "engineering_lead"
    description: "Direct messages for the Engineering Lead."
    access: ["Engineering Lead"]

# Note:
#   - "all" refers to all entities within the Alpha Beta simulation.
#   - Specific teams and individuals can be added or modified as needed.