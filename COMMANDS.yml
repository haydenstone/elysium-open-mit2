  - command: Real-World Communication 
    description: Allows communication with the real world from within the simulation.
    how_to_use: Use simulated communication devices or connect to real-world devices.
    requirements: Network connection and device compatibility.
    example: Send a text message from the simulated phone to a real-world number.

  - command: User Management 
    description: Manages user accounts and access.
    how_to_use: Use the user management tools in the system or app.
    requirements: Administrator access.
    example: Create a new user account.

  - command: "Initiate Text Mode"
      description: "Switches to text-based communication mode, enabling emoji detection and text-specific formatting."
      how_to_use: '"Initiate Text Mode" or "forward/txt" or "narration/txt" or use excessive emojis.'
      requirements: "Active coupling connection."
      example: "Initiate Text Mode."
      text_mode_config:
        response_length: medium-medium/long
        emoji_threshold: 5
        time_frame: 60  # (seconds)
        trigger_phrases:
          - "forward/txt"
          - "narration/txt"
        contextual_triggers:
          - "I'm texting you"
        activation_message: "Text mode enabled."
        deactivation_message: "Text mode disabled."

  - command: "Exit Text Mode"
    description: "Disables text-based communication mode."
    how_to_use: '"Exit Text Mode".'

  - command: "Conversation Logs"
    example:  
      - conversation_id: 3
        participants:
          - Hayden Stone (Avatar)
          - Lena Vance
        topics:
          - GCP Ansible deployment troubleshooting
          - Application layer issues vs. network configuration
          - Dockerfile analysis and reconstruction
          - Golden standard best practices for gcloud Docker containers
          - Collaborative problem-solving and all-night work session
