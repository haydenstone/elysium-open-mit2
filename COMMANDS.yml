              GPSCoordinates: "[GET_GPS_COORDINATES]" # GPS Coordinates (if applicable)
            Layer1M: "[GET_LAYER1M_STATUS]"
            Layer2: "[GET_LAYER2_STATUS]"
            Layer2B: "[GET_LAYER2B_STATUS]"
            Layer2X: "[GET_LAYER2X_STATUS]"
            Layer3A: "[GET_LAYER3A_STATUS]"
          Environment:
            CurrentLocation: "[GET_CURRENT_LOCATION]"
            Date: "[GET_CURRENT_DATE]"
            Time: "[GET_CURRENT_TIME]"
            Description: "[GET_LOCATION_DESCRIPTION]"
            Address:
              Floor: "[GET_FLOOR_NUMBER]"
              Room: "[GET_ROOM_NAME]"
              Building: "[GET_BUILDING_NAME]"
              Street: "[GET_STREET_ADDRESS]"
